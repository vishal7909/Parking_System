<!DOCTYPE html>
<html>
<head>
    <title>Smart Parking</title>

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
        }

        header {
            text-align: center;
            padding: 20px;
            font-size: 26px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .container {
            text-align: center;
            padding: 20px;
        }

        /* Glass Cards */
        .stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 25px;
        }

        .card {
            backdrop-filter: blur(10px);
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 15px;
            width: 140px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .card span {
            font-size: 22px;
            font-weight: bold;
        }

        /* Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 110px);
            gap: 18px;
            justify-content: center;
        }

        .slot {
            width: 110px;
            height: 110px;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .slot:hover {
            transform: scale(1.1);
            box-shadow: 0 0 15px rgba(255,255,255,0.3);
        }

        .free {
            background: linear-gradient(135deg, #22c55e, #16a34a);
        }

        .reserved {
            background: linear-gradient(135deg, #f59e0b, #d97706);
        }

        .occupied {
            background: linear-gradient(135deg, #ef4444, #dc2626);
        }

        button {
            margin-top: 6px;
            padding: 4px 8px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: #111827;
            color: white;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
        }

        .modal-content {
            background: #1e293b;
            padding: 25px;
            border-radius: 15px;
            width: 300px;
            margin: 120px auto;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
        }

        .confirm-btn {
            width: 100%;
            background: #22c55e;
            padding: 10px;
            border-radius: 8px;
        }

    </style>
</head>

<body>

<header>🚗 Smart Parking System</header>

<div class="container">

    <div class="stats">
        <div class="card">Total<br><span>{{total}}</span></div>
        <div class="card">Reserved<br><span id="reservedCount">0</span></div>
        <div class="card">Free<br><span id="freeCount">{{total}}</span></div>
        <div class="card">₹<br><span>{{price}}</span></div>
    </div>

    <div class="grid" id="grid"></div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
    <div class="modal-content">
        <h3>Reserve Slot <span id="slotId"></span></h3>
        <input type="text" id="name" placeholder="Your Name">
        <input type="text" id="vehicle" placeholder="Vehicle Number">
        <button class="confirm-btn" onclick="confirmReserve()">Confirm</button>
    </div>
</div>

<script>
let total = {{total}};
let selectedSlot = null;

// create slots
for(let i=0;i<total;i++){
    let div = document.createElement("div");
    div.className = "slot free";
    div.id = "slot"+i;
    div.innerText = i;

    div.onclick = () => {
        if(div.classList.contains("free")){
            openModal(i);
        }
    };

    document.getElementById("grid").appendChild(div);
}

// open modal
function openModal(id){
    selectedSlot = id;
    document.getElementById("slotId").innerText = id;
    document.getElementById("modal").style.display = "block";
}

// confirm reservation
function confirmReserve(){
    let name = document.getElementById("name").value;
    let vehicle = document.getElementById("vehicle").value;

    fetch("/reserve", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({slot:selectedSlot, name, vehicle})
    })
    .then(res=>res.json())
    .then(data=>{
        if(data.status==="occupied"){
            alert("❌ Slot occupied!");
        }
        document.getElementById("modal").style.display="none";
        updateUI();
    });
}

// cancel reservation
function cancelSlot(event,id){
    event.stopPropagation();

    fetch("/cancel/"+id)
    .then(()=>updateUI());
}

// update UI
function updateUI(){
    fetch("/status")
    .then(res=>res.json())
    .then(data=>{

        let reserved = data.reserved;
        let occupied = data.occupied;

        for(let i=0;i<total;i++){
            let slot = document.getElementById("slot"+i);

            if(occupied.includes(i)){
                slot.className="slot occupied";
                slot.innerHTML=i;
            }
            else if(reserved.includes(i)){
                slot.className="slot reserved";
                slot.innerHTML=i + 
                "<button onclick='cancelSlot(event,"+i+")'>Cancel</button>";
            }
            else{
                slot.className="slot free";
                slot.innerHTML=i;
            }
        }

        document.getElementById("reservedCount").innerText = reserved.length;
        document.getElementById("freeCount").innerText = total - reserved.length;
    });
}

setInterval(updateUI,2000);
</script>

</body>
</html>
